version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: video_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: videodb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: video_app
    depends_on:
      - mysql
    ports:
      - "8888:8888"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: videodb

volumes:
  mysql_data: